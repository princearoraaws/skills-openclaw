id: NEXUM-006
name: "Agent ID 重命名 + config 更新 + 自动路由逻辑"
type: coding
created_at: "2026-03-30T04:00:00Z"

scope:
  files:
    - nexum/config.json
    - packages/core/src/config.ts
    - packages/cli/src/commands/spawn.ts
    - packages/cli/src/lib/auto-route.ts
  boundaries:
    - packages/notify/
    - packages/prompts/
    - packages/spawn/
    - packages/cli/src/commands/health.ts
    - packages/cli/src/commands/init.ts
    - packages/cli/src/commands/callback.ts
  conflicts_with:
    - NEXUM-007

deliverables:
  - "nexum/config.json：agents 字段按新命名更新：codex-gen-01(codex/gpt-5.4/high)、codex-gen-02(codex/gpt-5.4/high)、codex-gen-03(codex/gpt-5.4/high)、codex-frontend-01(codex/gpt-5.4/medium)、codex-eval-01(codex/gpt-5.4/high)、codex-e2e-01(codex/gpt-5.4/medium)、claude-gen-01(claude/sonnet-4-6)、claude-gen-02(claude/sonnet-4-6)、claude-eval-01(claude/sonnet-4-6)、claude-plan-01(claude/opus-4-6)、claude-write-01(claude/sonnet-4-6)"
  - "packages/core/src/config.ts：AgentConfig 补充 reasoning?: string 字段；NexumConfig 补充 routing?: RoutingConfig 类型（见下）；新增 RoutingConfig 接口：{ defaultGenerator?: string; defaultEvaluator?: string; rules?: RoutingRule[] }；新增 RoutingRule 接口：{ match: string; generator: string; evaluator: string }（match 为正则字符串，匹配 contract name）"
  - "packages/cli/src/lib/auto-route.ts（新建）：autoSelectGenerator(contract, config) 函数：contract.generator === 'auto' 或未填时，按以下优先级选择：1) config.routing.rules 中第一个 match 匹配 contract.name 的 rule；2) 内置规则：creative→claude-write-01，含 webui/frontend/用户端/portal→claude-gen-01，含 admin/dashboard/管理→codex-frontend-01，含 e2e/test/测试→codex-e2e-01，其他→codex-gen-01；autoSelectEvaluator(generatorId, contract, config)：cross-review 原则：generator 是 codex-* → claude-eval-01；generator 是 claude-* → codex-eval-01；导出 resolveAgents(contract, config): { generator, evaluator }"
  - "packages/cli/src/commands/spawn.ts：import resolveAgents；在 runSpawn 和 runSpawnEval 里，contract.generator === 'auto' 或 contract.evaluator === 'auto' 时，调用 resolveAgents 填充；其他逻辑不变"

eval_strategy:
  type: review
  criteria:
    - id: C1
      desc: "nexum/config.json 的 agents 字段包含所有 11 个新命名 agent，字段完整（cli/model/reasoning）"
      method: code_review
      threshold: must_pass
    - id: C2
      desc: "AgentConfig 补充 reasoning 字段，RoutingConfig/RoutingRule 类型定义正确"
      method: code_review
      threshold: must_pass
    - id: C3
      desc: "auto-route.ts 的内置规则覆盖所有场景：creative/webui/admin/e2e/默认"
      method: code_review
      threshold: must_pass
    - id: C4
      desc: "cross-review 原则正确：codex-* generator → claude-eval-01；claude-* → codex-eval-01"
      method: code_review
      threshold: must_pass
    - id: C5
      desc: "spawn.ts 正确调用 resolveAgents，手写值优先（non-auto 时不走 auto 逻辑）"
      method: code_review
      threshold: must_pass
    - id: C6
      desc: "pnpm build 通过，无 TypeScript 错误"
      method: code_review
      threshold: must_pass

generator: codex-gen-01
evaluator: claude-eval-01
max_iterations: 3
depends_on: []
