id: NEXUM-007
name: "ACP 多 session 支持：spawn 加 -s 参数 + --ttl 0"
type: coding
created_at: "2026-03-30T04:00:00Z"

scope:
  files:
    - packages/spawn/src/spawn.ts
    - packages/spawn/src/__tests__/spawn.test.ts
  boundaries:
    - packages/core/
    - packages/notify/
    - packages/prompts/
    - packages/cli/
  conflicts_with:
    - NEXUM-006

deliverables:
  - "packages/spawn/src/spawn.ts：spawnAcpSession 的 acpx 命令加入 -s <agentId>（session name = agentId）和 --ttl 0（防超时 dead）；参数顺序：acpx -s <agentId> --ttl 0 --approve-all <cliName> exec -f <promptFile>；cliName 从 options.agentCli 取（'claude' 或 'codex'）；如果 SpawnOptions 里没有 agentCli，从 options.agentId 前缀推断（codex-* → codex，claude-* → claude，默认 codex）"
  - "packages/spawn/src/__tests__/spawn.test.ts：更新 mock 验证：acpx 调用包含 -s <agentId> 和 --ttl 0；新增测试：agentId=codex-gen-01 → cliName=codex；agentId=claude-gen-01 → cliName=claude；agentId=unknown → cliName=codex（默认）"

eval_strategy:
  type: review
  criteria:
    - id: C1
      desc: "spawnAcpSession 的 acpx args 包含 -s <agentId> 和 --ttl 0"
      method: code_review
      threshold: must_pass
    - id: C2
      desc: "cliName 从 agentCli 字段取，无 agentCli 时从 agentId 前缀推断（codex-* / claude-*）"
      method: code_review
      threshold: must_pass
    - id: C3
      desc: "测试更新，验证 -s 和 --ttl 0 存在；agentId 前缀推断逻辑有测试覆盖"
      method: code_review
      threshold: must_pass
    - id: C4
      desc: "pnpm build + pnpm test 通过"
      method: code_review
      threshold: must_pass

generator: codex-gen-02
evaluator: claude-eval-01
max_iterations: 3
depends_on: []
