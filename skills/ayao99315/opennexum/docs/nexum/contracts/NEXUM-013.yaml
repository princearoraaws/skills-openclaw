id: NEXUM-013
name: "webhook dispatch: 用 OpenClaw /hooks/agent 替换 acpx spawnAcpSession"
batch: batch-3

agent:
  generator: codex-gen-01
  evaluator: claude-eval-01

scope:
  files:
    - packages/spawn/src/spawn.ts
    - packages/spawn/src/__tests__/spawn.test.ts
    - packages/cli/src/commands/callback.ts
    - packages/core/src/config.ts

description: "当前 spawnAcpSession 依赖 acpx CLI，但 ACP session spawn 只能通过 OpenClaw sessions_spawn 工具触发，acpx 无法完成这个操作，导致自动 dispatch 从未真正工作。正确方案：callback.ts 完成状态更新+通知后，通过 HTTP POST /hooks/agent 触发 OpenClaw webhook，由 OpenClaw 唤醒主 agent（小明）来执行 sessions_spawn。spawnAcpSession 函数保留签名但改为 no-op（或直接删除调用点），dispatch 逻辑移到 webhook 触发。"

deliverables:
  - path: packages/spawn/src/spawn.ts
    description: "spawnAcpSession 改为 no-op stub（保留导出签名不破坏编译），或直接删除函数体只保留类型。不再调用 acpx CLI。"

  - path: packages/cli/src/commands/callback.ts
    description: "引入 dispatchViaWebhook(taskId, role, projectDir) 内部函数，替换所有 spawnAcpSession 调用点。dispatchViaWebhook 构造如下 payload 并 HTTP POST 到 OpenClaw gateway：POST http://127.0.0.1:18789/hooks/agent，Authorization: Bearer <token>，body: {message: 'nexum-dispatch: <taskId> <role> <projectDir>', name: 'Nexum', agentId: 'main', deliver: false}。token 从环境变量 OPENCLAW_HOOKS_TOKEN 读取，fallback 从 ~/.openclaw/openclaw.json 的 hooks.token 读取。dispatch 失败只 warn，不阻塞 callback 主流程。"

  - path: packages/core/src/config.ts
    description: "NexumConfig 新增可选字段 webhook: { gatewayUrl?: string; token?: string }，用于覆盖默认 gateway 地址（默认 http://127.0.0.1:18789）和 token（优先级低于环境变量）。"

eval_strategy:
  type: review
  criteria:
    - id: C1
      desc: "packages/spawn/src/spawn.ts 中 spawnAcpSession 不再调用 acpx CLI（无 execa/execFile 调用 acpx）"
      weight: 3
    - id: C2
      desc: "packages/cli/src/commands/callback.ts 存在 dispatchViaWebhook 函数，向 /hooks/agent 发 HTTP POST，message 包含 taskId、role、projectDir"
      weight: 3
    - id: C3
      desc: "token 读取优先级：OPENCLAW_HOOKS_TOKEN 环境变量 > nexum config webhook.token > ~/.openclaw/openclaw.json hooks.token"
      weight: 2
    - id: C4
      desc: "pnpm build 无 TypeScript 编译错误"
      weight: 2
    - id: C5
      desc: "dispatch 失败时只 console.warn，不 throw，callback 主流程不受影响"
      weight: 1

max_iterations: 3
