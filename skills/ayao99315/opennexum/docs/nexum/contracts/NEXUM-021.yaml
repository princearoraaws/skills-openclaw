id: NEXUM-021
name: "P1+P3: remove orphan validateContract, extract shared readEvalSummary to core"
batch: batch-5

agent:
  generator: codex-gen-01
  evaluator: claude-eval-01

scope:
  files:
    - packages/core/src/contract.ts
    - packages/core/src/index.ts
    - packages/cli/src/commands/complete.ts
    - packages/cli/src/commands/callback.ts

description: "Two related cleanup tasks: 1) validateContract in contract.ts is an orphan function never called, with fields inconsistent with actual Contract usage (requires created_at, generator/evaluator as top-level strings, deliverables as string[], criteria.method/threshold). Delete it or rewrite to match actual schema. 2) readEvalSummary + parseYamlScalar are duplicated in both complete.ts and callback.ts with slight variations. Extract to @nexum/core as parseEvalResult(path) returning EvalSummary, export from core/index.ts, then replace both implementations."

deliverables:
  - path: packages/core/src/contract.ts
    description: "Remove validateContract function entirely (it has no callers). Keep parseContract untouched."

  - path: packages/core/src/index.ts
    description: "Export new parseEvalResult function. Add EvalSummary and CriterionResult types to exports."

  - path: packages/cli/src/commands/complete.ts
    description: "Replace local readEvalSummary + parseYamlScalar with imported parseEvalResult from @nexum/core. Keep EvalSummary shape compatible (complete.ts needs failedCriteria field - ensure parseEvalResult returns it)."

  - path: packages/cli/src/commands/callback.ts
    description: "Replace local readEvalSummary + parseYamlScalar with imported parseEvalResult from @nexum/core."

eval_strategy:
  type: review
  criteria:
    - id: C1
      desc: "validateContract is removed from packages/core/src/contract.ts"
      weight: 2
    - id: C2
      desc: "parseEvalResult is exported from @nexum/core and returns { feedback, passCount, totalCount, criteriaResults, failedCriteria }"
      weight: 3
    - id: C3
      desc: "complete.ts and callback.ts both import and use parseEvalResult from @nexum/core, no local readEvalSummary remains"
      weight: 3
    - id: C4
      desc: "pnpm build passes with no TypeScript errors"
      weight: 2

max_iterations: 3
