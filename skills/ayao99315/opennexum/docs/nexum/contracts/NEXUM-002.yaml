id: NEXUM-002
name: "重写 @nexum/notify：通过 openclaw CLI 发送通知，移除直连 Telegram API"
type: coding
created_at: "2026-03-30T01:00:00Z"

scope:
  files:
    - packages/notify/src/telegram.ts
    - packages/notify/src/index.ts
    - packages/notify/src/__tests__/telegram.test.ts
    - packages/core/src/config.ts
  boundaries:
    - packages/cli/
    - packages/prompts/
    - packages/spawn/
    - packages/core/src/types.ts
    - packages/core/src/tasks.ts
  conflicts_with: []

deliverables:
  - "packages/notify/src/telegram.ts：sendMessage(target, text) 改为通过 execa('openclaw', ['message', 'send', '--target', target, '--message', text]) 发送，去掉 botToken 参数；捕获所有错误不抛出（通知失败不阻塞主流程），记录 console.warn"
  - "packages/notify/src/index.ts：导出更新后的 sendMessage，移除 getChatId / getBotToken 导出"
  - "packages/core/src/config.ts：NotifyConfig 的 botToken 字段删除；新增类型 GitConfig { remote?: string; branch?: string }、WatchConfig { enabled?: boolean; intervalMin?: number; timeoutMin?: number }、HealthConfig { timeoutMin?: number }；NexumConfig 补充 git?: GitConfig、watch?: WatchConfig、health?: HealthConfig 字段"
  - "packages/notify/src/__tests__/telegram.test.ts：更新测试，mock execa 调用而非 fetch；验证 openclaw message send 命令被正确调用；验证发送失败时不抛出异常"

eval_strategy:
  type: review
  criteria:
    - id: C1
      desc: "sendMessage 不再直接调用 Telegram API（无 fetch 到 api.telegram.org）"
      method: code_review
      threshold: must_pass
    - id: C2
      desc: "sendMessage 通过 execa 调用 openclaw message send，参数正确"
      method: code_review
      threshold: must_pass
    - id: C3
      desc: "sendMessage 发送失败时捕获错误，不向上抛出"
      method: code_review
      threshold: must_pass
    - id: C4
      desc: "NotifyConfig 中 botToken 已删除，新增 git/watch/health 类型"
      method: code_review
      threshold: must_pass
    - id: C5
      desc: "测试文件更新，mock execa 而非 fetch，测试通过"
      method: code_review
      threshold: must_pass

generator: cc-frontend
evaluator: cc-frontend
max_iterations: 3
depends_on: []
