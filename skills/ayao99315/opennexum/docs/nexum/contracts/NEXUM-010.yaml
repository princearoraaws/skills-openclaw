id: NEXUM-010
name: "任务批次管理：batch 字段 + 历史归档 + 进度按批次计算"
type: coding
created_at: "2026-03-30T05:15:00Z"

scope:
  files:
    - packages/core/src/types.ts
    - packages/core/src/tasks.ts
    - packages/cli/src/commands/status.ts
    - packages/cli/src/commands/complete.ts
    - packages/cli/src/lib/archive.ts
  boundaries:
    - packages/notify/
    - packages/prompts/
    - packages/spawn/
    - packages/cli/src/commands/health.ts
    - packages/cli/src/commands/spawn.ts
    - packages/cli/src/commands/init.ts
    - packages/cli/src/commands/callback.ts
  conflicts_with: []

deliverables:
  - "packages/core/src/types.ts：Task interface 新增可选字段 batch?: string（任务所属批次名，如 'v2-redesign'）；ActiveTasksFile 新增 currentBatch?: string（当前默认批次名）"
  - "packages/core/src/tasks.ts：getBatchProgress(projectDir, batch) 函数：返回 { done: number, total: number, batch: string }，只统计指定 batch 的任务；getActiveBatch(projectDir) 函数：读取 currentBatch 字段，无则返回 undefined；writeBatch(projectDir, batch) 函数：更新 currentBatch 字段"
  - "packages/cli/src/lib/archive.ts（新建）：archiveDoneTasks(projectDir, batch?) 函数：将 status=done 的任务（可选过滤 batch）移入 nexum/history/<batch|YYYY-MM-DD>.json；active-tasks.json 只保留非 done 状态的任务；归档文件已存在时追加，不覆盖；nexum archive 命令触发，或 done 任务超过 20 个时自动触发"
  - "packages/cli/src/commands/status.ts：显示进度时优先按当前 batch 统计（getBatchProgress）；无 batch 时 fallback 到全部任务；新增 nexum status --batch <name> 过滤显示；输出格式：'📊 v2-redesign: 3/6  |  总体: 13/15'"
  - "packages/cli/src/commands/complete.ts：task done 时，若 active-tasks.json 中 done 任务超过 20 个，自动调用 archiveDoneTasks"

eval_strategy:
  type: review
  criteria:
    - id: C1
      desc: "Task 类型新增 batch 字段，ActiveTasksFile 新增 currentBatch，类型定义正确"
      method: code_review
      threshold: must_pass
    - id: C2
      desc: "getBatchProgress 正确过滤指定 batch 的任务计算进度"
      method: code_review
      threshold: must_pass
    - id: C3
      desc: "archiveDoneTasks 正确将 done 任务移入 history 目录，active-tasks.json 只剩非 done"
      method: code_review
      threshold: must_pass
    - id: C4
      desc: "status 命令优先显示 batch 进度，格式 '📊 <batch>: X/Y  |  总体: A/B'"
      method: code_review
      threshold: must_pass
    - id: C5
      desc: "complete 时 done 任务超 20 个自动触发归档，不影响主流程"
      method: code_review
      threshold: must_pass

generator: auto
evaluator: auto
max_iterations: 3
depends_on: []
