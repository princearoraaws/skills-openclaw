id: NEXUM-004
name: "交互式 nexum init 向导：CLI 检测、git 校验、notify 配置、watch 选项"
type: coding
created_at: "2026-03-30T01:00:00Z"

scope:
  files:
    - packages/cli/src/commands/init.ts
    - packages/cli/src/lib/detect.ts
  boundaries:
    - packages/core/
    - packages/prompts/
    - packages/notify/
    - packages/spawn/
    - packages/cli/src/commands/health.ts
    - packages/cli/src/commands/spawn.ts
  conflicts_with: []

deliverables:
  - "packages/cli/src/lib/detect.ts（新建）：detectAvailableCli() 检测 claude/codex 是否可用（通过 execa --version，捕获异常）；返回 { claude: boolean, codex: boolean }；detectGitRemote(projectDir) 检测 git remote 是否已配置并可连通（git ls-remote --exit-code origin 2>/dev/null）"
  - "packages/cli/src/commands/init.ts：runInit 改为交互式向导，使用 node:readline 实现（不引入第三方 prompt 库）；交互步骤顺序：1) 项目名（默认当前目录名）2) 技术栈描述（默认空）3) Git remote（默认 origin，留空跳过，填了则校验连通性）4) Git branch（默认 main）5) OpenClaw notify target（默认空，填了写入 config）6) 是否启用 watch（默认 n，y 则询问 interval/timeout 并写入 config）；CLI 检测：运行前自动检测 claude/codex 可用性，不可用时打印警告但不阻断；将检测结果写入 config.agents（只写可用的 cli）；最终写入 nexum/config.json，包含 git/watch/notify/agents/project 所有字段；支持 --yes flag 跳过交互使用所有默认值（非 TTY 环境自动激活）"

eval_strategy:
  type: review
  criteria:
    - id: C1
      desc: "交互步骤完整，顺序正确，每步有合理默认值"
      method: code_review
      threshold: must_pass
    - id: C2
      desc: "不引入第三方 prompt/inquirer 库，使用 node:readline"
      method: code_review
      threshold: must_pass
    - id: C3
      desc: "CLI 检测结果正确写入 config.agents"
      method: code_review
      threshold: must_pass
    - id: C4
      desc: "--yes flag 或非 TTY 时跳过交互，使用默认值"
      method: code_review
      threshold: must_pass
    - id: C5
      desc: "git remote 校验：有值时（包括默认 origin）做连通性校验，校验失败只 warn 不阻断初始化；显式用 '-' 跳过时不进入校验"
      method: code_review
      threshold: must_pass
    - id: C6
      desc: "生成的 config.json 包含 git/watch/notify/agents/project 所有字段"
      method: code_review
      threshold: must_pass

generator: cc-frontend
evaluator: codex-1
max_iterations: 3
depends_on:
  - NEXUM-002
  - NEXUM-003
