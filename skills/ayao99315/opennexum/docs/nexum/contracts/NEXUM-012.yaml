id: NEXUM-012
name: "编排自动化终结版：callback 直接 dispatch eval/next-task + daemon status 修复"
type: coding
created_at: "2026-03-30T06:55:00Z"

scope:
  files:
    - packages/cli/src/commands/callback.ts
    - packages/cli/src/lib/daemon.ts
  boundaries:
    - packages/core/
    - packages/notify/
    - packages/spawn/
    - packages/prompts/
    - packages/cli/src/commands/health.ts
    - packages/cli/src/commands/complete.ts
    - packages/cli/src/commands/spawn.ts
  conflicts_with: []

deliverables:
  - "packages/cli/src/commands/callback.ts：runGeneratorCallback 里，状态更新和通知发完后，立即调用 runSpawnEval(taskId, projectDir) 生成 eval prompt，然后调用 spawnAcpSession 启动 evaluator session（session name = 'claude-eval-<taskId>'，ttl = 0，approve-all = true），并调用 updateTask 记录 acp_session_key；整个 spawn 步骤用 try/catch 包裹，失败只 console.warn，不阻断主流程"
  - "packages/cli/src/commands/callback.ts：runEvaluatorCallback 的 done 分支里，调用 readTasks 找出因本任务解锁的 pending 任务（unlockedTasks）；对每个解锁的任务调用 runSpawn(unlockedTaskId, projectDir) + spawnAcpSession 启动 generator session（session name = 'codex-gen-<unlockedTaskId>'）；整个步骤 try/catch 包裹，失败只 warn"
  - "packages/cli/src/lib/daemon.ts：getDaemonStatus macOS 分支：改用 launchctl list <label>（不带额外参数）的 JSON 输出，用 JSON.parse 解析，检查结果对象是否含 PID 字段且值为数字（非 null/undefined）来判断 running；若 JSON.parse 失败则 fallback 到 stopped"

eval_strategy:
  type: review
  criteria:
    - id: C1
      desc: "runGeneratorCallback：状态/通知发完后，直接 spawn evaluator（不依赖 watch 轮询），session name = claude-eval-<taskId>"
      method: code_review
      threshold: must_pass
    - id: C2
      desc: "runEvaluatorCallback done 分支：unlock 的 pending 任务被自动 spawn generator，session name = codex-gen-<taskId>"
      method: code_review
      threshold: must_pass
    - id: C3
      desc: "两处 spawn 均有 try/catch，失败不阻断主流程"
      method: code_review
      threshold: must_pass
    - id: C4
      desc: "getDaemonStatus macOS：用 JSON.parse 解析 launchctl list 输出，PID 为数字时返回 running"
      method: code_review
      threshold: must_pass
    - id: C5
      desc: "pnpm build 通过"
      method: code_review
      threshold: must_pass

generator: auto
evaluator: auto
max_iterations: 3
depends_on: []
