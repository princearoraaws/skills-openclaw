id: NEXUM-017
name: "通知优化 + git 英文提交 + gpt-5 上报修正"
batch: batch-4

agent:
  generator: codex-gen-01
  evaluator: claude-eval-01

scope:
  files:
    - packages/notify/src/templates.ts
    - packages/prompts/src/templates/generator.md
    - packages/prompts/src/templates/evaluator.md
    - packages/prompts/src/renderer.ts

description: "四个改动：1) 通知分隔线 SEP 从 30 个字符减到 15 个字符；2) generator prompt 里的 git commit 默认使用英文（commit message 模板改为英文）；3) evaluator prompt 里的 nexum callback 说明改为英文；4) generator prompt 里的 --model 参数说明，明确要求填 gpt-5.4 而不是 gpt-5。"

deliverables:
  - path: packages/notify/src/templates.ts
    description: "第 6 行 SEP 常量从 '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━'（30字符）改为 '━━━━━━━━━━━━━━━'（15字符）。"

  - path: packages/prompts/src/templates/generator.md
    description: "1) git commit message 模板改为英文格式，例如 'feat({{TASK_ID_LOWER}}): {{TASK_ID}}: {{TASK_NAME_EN}}' 或直接用英文描述。2) --model 参数的示例/说明注明应填 gpt-5.4（不是 gpt-5）。"

  - path: packages/prompts/src/templates/evaluator.md
    description: "nexum callback 示例里的 --model 参数说明改为英文，并注明 gpt-5.4（不是 gpt-5）。"

  - path: packages/prompts/src/renderer.ts
    description: "如果 renderGeneratorPrompt 里有硬编码中文 commit message，一并改为英文。如果没有，跳过此文件（不要为了修改而修改）。"

eval_strategy:
  type: review
  criteria:
    - id: C1
      desc: "packages/notify/src/templates.ts 的 SEP 常量长度为 15 个 ━ 字符"
      weight: 2
    - id: C2
      desc: "generator.md 模板里 git commit message 是英文格式"
      weight: 3
    - id: C3
      desc: "generator.md 和 evaluator.md 里 --model 示例/注释包含 gpt-5.4 字样"
      weight: 2
    - id: C4
      desc: "pnpm build 无 TypeScript 编译错误"
      weight: 2
    - id: C5
      desc: "只修改了 scope.files 内的文件"
      weight: 1

max_iterations: 2
