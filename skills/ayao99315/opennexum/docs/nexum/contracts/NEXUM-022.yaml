id: NEXUM-022
name: "P2: replace custom YAML parser with js-yaml"
batch: batch-5

agent:
  generator: codex-gen-01
  evaluator: claude-eval-01

scope:
  files:
    - packages/core/src/contract.ts
    - packages/core/package.json

description: "The custom YAML parser in contract.ts does not support block scalars (|), multiline strings, or anchors, making Contract description fields awkward to write. Replace parseYaml internal function with js-yaml.load(). Keep parseContract signature unchanged - it still reads the file and returns Contract. Remove all internal tokenize/parseBlock/parseMapping/parseSequence/parseScalar functions."

deliverables:
  - path: packages/core/package.json
    description: "Add js-yaml as a dependency: 'js-yaml': '^4.1.0'. Also add @types/js-yaml as devDependency."

  - path: packages/core/src/contract.ts
    description: "Replace the entire internal YAML parsing implementation (tokenize, parseBlock, parseMapping, parseSequence, parseScalar, findUnquotedColon, etc.) with: import { load as loadYaml } from 'js-yaml'; then use loadYaml(source) in parseContract. Keep the rest of contract.ts unchanged (parseContract function signature, isPlainObject check, file reading). Remove validateContract if not already removed by NEXUM-021."

eval_strategy:
  type: review
  criteria:
    - id: C1
      desc: "packages/core/package.json includes js-yaml as dependency and @types/js-yaml as devDependency"
      weight: 2
    - id: C2
      desc: "contract.ts uses js-yaml load() instead of custom parseYaml - no tokenize/parseBlock/parseMapping functions remain"
      weight: 4
    - id: C3
      desc: "parseContract still correctly parses all existing Contract YAML files in docs/nexum/contracts/"
      weight: 2
    - id: C4
      desc: "pnpm build and pnpm --filter @nexum/core test pass with no errors"
      weight: 2

max_iterations: 3
